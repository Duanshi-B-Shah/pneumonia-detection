version: "3.8"

services:
  api:
    build: .
    container_name: pneumonia-api
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints:ro
      - ./static:/app/static
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  demo:
    build: .
    container_name: pneumonia-demo
    command: ["streamlit", "run", "ui/demo_streamlit.py"]
    ports:
      - "8501:8501"
    volumes:
      - ./checkpoints:/app/checkpoints:ro
      - ./ui:/app/ui:ro
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
